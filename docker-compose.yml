services:
  postgres:
    image: postgres:16
    container_name: unqplus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: unqplus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - unqplus_pgdata:/var/lib/postgresql/data

volumes:
  unqplus_pgdata:
