<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <rect width="1600" height="900" fill="#FDFAF5"/>

  <defs>
    <symbol id="bolt" viewBox="0 0 50 85">
      <polygon points="34,0 8,45 26,45 16,85 44,36 24,36 42,0" fill="#1a1a1a"/>
    </symbol>

    <pattern id="boltPattern" x="0" y="0" width="150" height="150" patternUnits="userSpaceOnUse" patternTransform="rotate(-45, 800, 450)">
      <!-- Each bolt rotated 45deg to counteract the pattern rotation -->
      <g transform="translate(75, 75) rotate(45) translate(-25, -42)">
        <use href="#bolt" width="50" height="85"/>
      </g>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#boltPattern)"/>
</svg>
